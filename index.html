<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <meta name="color-scheme" content="dark" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Primary meta -->
    <title>Scale-Vis — compare anything to anything</title>
    <meta
      name="description"
      content="How big is a T-Rex, really? Scale-Vis puts any two things side by side at true scale — animals, vehicles, dinosaurs, everyday objects — in a fast, amber-terminal size comparator."
    />
    <meta
      name="keywords"
      content="size comparison, scale comparison, how big is, to scale, dinosaur size, animal size, object size, visualizer"
    />
    <meta name="author" content="chakri" />
    <link rel="canonical" href="https://scale-vis.chakri.me/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Scale-Vis" />
    <meta property="og:url" content="https://scale-vis.chakri.me/" />
    <meta property="og:title" content="Scale-Vis — compare anything to anything" />
    <meta
      property="og:description"
      content="Put any two things side by side at true scale — animals, vehicles, dinosaurs, everyday objects. A fast, amber-terminal size comparator."
    />
    <meta property="og:image" content="https://scale-vis.chakri.me/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Scale-Vis — a human silhouette dwarfed by a T-Rex, both to scale on a shared baseline."
    />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Scale-Vis — compare anything to anything" />
    <meta
      name="twitter:description"
      content="Put any two things side by side at true scale — animals, vehicles, dinosaurs, everyday objects."
    />
    <meta name="twitter:image" content="https://scale-vis.chakri.me/og.png" />

    <!-- Pixel font: display=block so it NEVER flashes a fallback (§3, §15). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=block"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <!-- Boot mask: pure-black with no visible content until the app has mounted
         and its styles are applied, then reveal — kills the flash of unstyled
         HTML (Vite injects CSS via JS in dev; also guards a slow first load). -->
    <style>
      html { background: #000; }
      body { visibility: hidden; }
    </style>
    <script>
      addEventListener("DOMContentLoaded", function () {
        requestAnimationFrame(function () {
          document.body.style.visibility = "visible";
        });
      });
    </script>
    <noscript><style>body { visibility: visible; }</style></noscript>
    <!-- Amber Phosphor theme tokens — single source of truth -->
    <link rel="stylesheet" href="https://theme.chakri.me/tokens.css" />
  </head>
  <body class="booting">
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
